<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="85%" cy="0%" r="65%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0%" cy="100%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1120"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Card border -->
  <rect x="28" y="28" width="1144" height="574" rx="20" fill="none" stroke="#25334d" stroke-width="1.5"/>

  <!-- Accent bar top -->
  <rect x="28" y="28" width="1144" height="5" rx="3" fill="url(#accent)"/>

  <!-- Runner icon (SVG path — no emoji dependency) -->
  <g transform="translate(96, 180) scale(1.1)" fill="#2dd4bf" opacity="0.9">
    <!-- Simple stylised runner: circle head + body suggestion -->
    <circle cx="52" cy="28" r="22" fill="#2dd4bf"/>
    <path d="M30 58 Q52 46 74 58 L84 110 L66 110 L52 80 L38 110 L20 110 Z" fill="#2dd4bf"/>
    <path d="M20 110 L6 148 L22 148 L36 118" fill="#2dd4bf"/>
    <path d="M84 110 L98 148 L82 148 L68 118" fill="#2dd4bf"/>
    <path d="M38 72 L14 90 L22 102 L48 82" fill="#2dd4bf"/>
    <path d="M66 72 L90 90 L82 102 L56 82" fill="#2dd4bf"/>
  </g>

  <!-- Title -->
  <text x="600" y="230"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="88" font-weight="800" fill="#e8eef7"
    text-anchor="middle" letter-spacing="-3">Pace Forecast</text>

  <!-- Tagline -->
  <text x="600" y="300"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="30" fill="#93a3bd" text-anchor="middle">
    Adjust your running pace for heat, humidity &amp; altitude
  </text>

  <!-- Divider -->
  <line x1="300" y1="348" x2="900" y2="348" stroke="#25334d" stroke-width="1"/>

  <!-- Three feature pills -->
  <!-- Temp -->
  <rect x="150" y="376" width="260" height="68" rx="34" fill="#0f172a" stroke="#25334d" stroke-width="1.5"/>
  <text x="200" y="417" font-family="sans-serif" font-size="26" fill="#2dd4bf">■</text>
  <text x="280" y="419"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" fill="#e8eef7" text-anchor="middle">Temperature</text>

  <!-- Humidity -->
  <rect x="470" y="376" width="260" height="68" rx="34" fill="#0f172a" stroke="#25334d" stroke-width="1.5"/>
  <text x="520" y="417" font-family="sans-serif" font-size="26" fill="#2dd4bf">■</text>
  <text x="600" y="419"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" fill="#e8eef7" text-anchor="middle">Humidity</text>

  <!-- Altitude -->
  <rect x="790" y="376" width="260" height="68" rx="34" fill="#0f172a" stroke="#25334d" stroke-width="1.5"/>
  <text x="840" y="417" font-family="sans-serif" font-size="26" fill="#2dd4bf">■</text>
  <text x="920" y="419"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" fill="#e8eef7" text-anchor="middle">Altitude</text>

  <!-- URL -->
  <text x="600" y="548"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="28" fill="#2dd4bf" text-anchor="middle" font-weight="600" letter-spacing="0.5">
    paceforecast.com
  </text>
</svg>
